name: Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      security-events: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          scope: '@softspark'

      - name: Install release dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y bats parallel shellcheck
          npm ci

      - name: Generate package assets
        run: |
          npm run generate:all
          test -s AGENTS.md

      - name: Gate release
        run: |
          python3 scripts/ecosystem_doctor.py --offline --check
          python3 scripts/validate.py --strict
          python3 scripts/audit_skills.py --ci
          python3 scripts/audit_skills.py --sarif > audit.sarif
          shellcheck --severity=warning app/hooks/*.sh
          npm test

      - name: Upload security audit
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: audit.sarif

      - name: Publish to npm
        run: npm publish --access public --ignore-scripts --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@fe965f7af51af5f2602596916f38a38df2e33de0 # v3.0.2 (node24 runtime)
        with:
          generate_release_notes: true
